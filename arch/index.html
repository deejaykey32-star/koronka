<title>Koronka do Miłosierdzia Bożego</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--g:#d4a843;--sh:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)}
html,body{background:#111;color:#e8e0d4;font-family:Georgia,serif;
  overflow:hidden;height:100%;height:100dvh;width:100%;
  display:flex;justify-content:center;
  touch-action:manipulation;user-select:none;-webkit-user-select:none}
#app{width:100%;max-width:500px;height:100%;background:#000;position:relative;box-shadow:0 0 50px rgba(0,0,0,0.8)}
.bar, .lp, .main, .st, .pr { width: 100%; max-width: 500px; left: 50% !important; transform: translateX(-50%); }
.st-lang, .st-tts { left: auto !important; right: auto !important; }
.st-lang { left: calc(50% + 200px) !important; transform: translateX(-100%); }
.st-tts { left: calc(50% - 240px) !important; }
@media (max-width: 500px) {
  .st-lang { right: 10px !important; left: auto !important; transform: none; }
  .st-tts { left: 10px !important; transform: none; }
}
.pwa-b{position:absolute;top:60px;left:50%;transform:translateX(-50%);z-index:300;
  background:rgba(212,168,67,.95);color:#000;padding:10px 20px;border-radius:20px;
  font:700 13px sans-serif;cursor:pointer;display:none;box-shadow:0 4px 15px rgba(0,0,0,0.5)}
.bar{position:absolute;left:0;right:0;z-index:100;display:flex;align-items:center;
  justify-content:space-between;padding:4px 8px;
  background:rgba(0,0,0,.93);backdrop-filter:blur(6px)}
.bar-t{top:0;height:calc(44px + var(--sh));padding-top:var(--sh);
  border-bottom:1px solid rgba(212,168,67,.25)}
.bar-b{bottom:0;height:calc(68px + var(--sb));padding-bottom:var(--sb);
  justify-content:center;gap:12px;border-top:1px solid rgba(212,168,67,.25)}
.bg2{display:flex;gap:4px;align-items:center}
.cb{background:rgba(255,255,255,.06);border:1px solid rgba(212,168,67,.3);
  color:var(--g);font:700 12px/1 serif;padding:6px 9px;border-radius:5px;cursor:pointer;
  -webkit-tap-highlight-color:transparent}
.cb.on{background:rgba(212,168,67,.22);border-color:var(--g)}
.lb{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
  color:#e8e0d4;font-size:11px;padding:4px 8px;border-radius:4px;cursor:pointer;
  display:flex;align-items:center;gap:4px}
.lb.on{background:rgba(212,168,67,.15);border-color:var(--g);color:var(--g)}
.lp{position:absolute;top:calc(44px + var(--sh));left:0;right:0;z-index:99;
  background:rgba(0,0,0,.97);padding:6px;display:none;flex-wrap:wrap;
  gap:4px;justify-content:center;border-bottom:1px solid rgba(212,168,67,.2)}
.lp.show{display:flex}
.main{position:absolute;top:calc(44px + var(--sh));left:0;right:0;
  bottom:calc(68px + var(--sb));overflow:hidden;background:#000}
.bgimg{position:absolute;top:-5%;left:-5%;width:110%;height:110%;
  object-fit:cover;object-position:center 0%;pointer-events:none}
/* Rays SVG: no overflow clip so labels can be seen */
.rays-svg{position:absolute;inset:0;width:100%;height:100%;z-index:3;pointer-events:none;overflow:visible}
.sv{position:absolute;inset:0;width:100%;height:100%;z-index:10;overflow:hidden}
.pr{position:absolute;left:3%;right:3%;z-index:20;pointer-events:none;
  bottom:calc(70px + var(--sb))}
.pb{background:rgba(0,0,0,.88);backdrop-filter:blur(12px);
  border:1px solid rgba(212,168,67,.2);border-radius:10px;padding:9px 14px;text-align:center}
.pt{font:700 10px/1 serif;color:var(--g);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.pp{font:italic 15px/1.45 Georgia,serif;color:#e8e0d4}
.pc{font:11px/1 serif;color:rgba(212,168,67,.5);margin-top:4px}
.nb{background:rgba(212,168,67,.1);border:2px solid var(--g);color:var(--g);
  border-radius:50%;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  width:48px;height:48px;-webkit-tap-highlight-color:transparent}
.nb-big{background:rgba(212,168,67,.15);border:3px solid var(--g);color:var(--g);
  width:80px;height:80px;border-radius:50%;font-size:36px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 18px rgba(212,168,67,.35);-webkit-tap-highlight-color:transparent}
.nb-big:active{transform:scale(.96)}
.st{position:absolute;top:0;left:0;width:100%;height:100%;
  z-index:200;overflow:hidden;background:#000;
  display:flex;flex-direction:column;align-items:center;
  justify-content:flex-end;padding-bottom:12%}
.st-bg{position:absolute;top:-5%;left:-5%;width:110%;height:110%;
  object-fit:cover;object-position:center 2%}
.st-ov{position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(0,0,0,.0)0%,rgba(0,0,0,.05)55%,
    rgba(0,0,0,.75)78%,rgba(0,0,0,.97)100%)}
.st-c{position:relative;z-index:2;width:100%;display:flex;flex-direction:column;
  align-items:center;padding:0 16px}
.st-lang{position:absolute;top:calc(10px + var(--sh));right:10px;z-index:210}
.st-tts{position:absolute;top:calc(10px + var(--sh));left:10px;z-index:210}
/* Sacrament labels: absolutely positioned divs for reliable rendering */
.ray-label{position:absolute;z-index:4;pointer-events:none;
  transform-origin:center center;
  font:700 11px/1 Georgia,serif;letter-spacing:0.5px;
  white-space:nowrap;text-transform:uppercase}
</style>
</head>

pl:{f:'🇵🇱',n:'Polski',go:'Rozpocznij modlitwę',ti:'Koronka do Bożego Miłosierdzia',su:'Jezu, ufam Tobie',vl:'pl-PL',
  cross:'W imię Ojca i Syna, i Ducha Świętego. Amen.',
  fp:'O Krwi i Wodo, któraś wypłynęła z Najświętszego Serca Jezusowego, jako zdrój Miłosierdzia dla nas — ufam Tobie.',
  of:'Ojcze nasz, któryś jest w niebie, święć się imię Twoje; przyjdź królestwo Twoje; bądź wola Twoja, jako w niebie tak i na ziemi. Chleba naszego powszedniego daj nam dzisiaj i odpuść nam nasze winy, jako i my odpuszczamy naszym winowajcom, i nie wódź nas na pokuszenie, ale nas zbaw ode złego. Amen.',
  hm:'Zdrowaś Maryjo, łaski pełna, Pan z Tobą. Błogosławionaś Ty między niewiastami i błogosławiony owoc żywota Twojego, Jezus. Święta Maryjo, Matko Boża, módl się za nami grzesznymi, teraz i w godzinę śmierci naszej. Amen.',
  cr:'Wierzę w Boga, Ojca wszechmogącego, Stworzyciela nieba i ziemi, i w Jezusa Chrystusa, Syna Jego jedynego, Pana naszego, który się począł z Ducha Świętego, narodził się z Maryi Panny, umęczon pod Ponckim Piłatem, ukrzyżowan, umarł i pogrzebion. Zstąpił do piekieł, trzeciego dnia zmartwychwstał. Wstąpił na niebiosa, siedzi po prawicy Boga Ojca wszechmogącego. Stamtąd przyjdzie sądzić żywych i umarłych. Wierzę w Ducha Świętego, święty Kościół powszechny, świętych obcowanie, grzechów odpuszczenie, ciała zmartwychwstanie, żywot wieczny. Amen.',
  ef:'Ojcze Przedwieczny, ofiaruję Ci Ciało i Krew, Duszę i Bóstwo najmilszego Syna Twojego, a Pana naszego Jezusa Chrystusa, na przebłaganie za grzechy nasze i całego świata.',
  fs:'Dla Jego bolesnej męki miej miłosierdzie dla nas i całego świata.',
  hg:'Święty Boże, Święty Mocny, Święty Nieśmiertelny, zmiłuj się nad nami i nad całym światem.',

  lEf:'Ojcze Przedwieczny',lFs:'Dla Jego bolesnej Męki',lHg:'Zakończenie',lFpE:'Modlitwa końcowa',
  sa:['Chrzest','Pokuta','Namaszczenie Chorych','Małżeństwo','Kapłaństwo','Bierzmowanie','Eucharystia'],de:'Dziesiątka',ow:'z'},

function buildPoints(W,H){
  var padX=W*0.012, heartTop=H*0.35, heartBot=H*0.86, cx=W/2;
  var scaleX=(W-2*padX)/36, scaleY=(heartBot-heartTop)/24;
  var NN=10000, curve=new Array(NN);
  for(var i=0;i<NN;i++){
    var a=(i/NN)*2*Math.PI, s=Math.sin(a);
    var mx=16*s*s*s;
    var my=13*Math.cos(a)-5*Math.cos(2*a)-2*Math.cos(3*a)-Math.cos(4*a);
    curve[i]={x:cx+mx*scaleX, y:heartTop+(5-my)*scaleY};
  }
  var arc=new Array(NN); arc[0]=0;
  for(var i=1;i<NN;i++){
    var dx=curve[i].x-curve[i-1].x, dy=curve[i].y-curve[i-1].y;
    arc[i]=arc[i-1]+Math.sqrt(dx*dx+dy*dy);
  }
  var total=arc[NN-1];
  var n=54, nom=total/n, off=nom*0.5;
  var ring=new Array(n), ci=0;
  for(var b=0;b<n;b++){
    var tgt=off+b*nom; if(tgt>=total)tgt-=total;
    while(ci<NN-1&&arc[ci]<tgt)ci++;
    ring[b]={x:curve[ci].x, y:curve[ci].y};
  }
  var rSm=Math.max(5,  Math.min(nom/2.8, 11));
  var rBl=Math.max(7,  Math.min(nom/2.2, 14));
  var rCr=Math.max(5.5,Math.min(nom/2.5, 12));
  var touch=rSm*2.0;     // touching distance (for tip & cleft pairs)
  var gap  =rSm*2.0+2;   // small gap for all other adjacent pairs

  // Repulsion: adjacent pairs only, with size-aware min distances
  for(var pass=0;pass<400;pass++){
    for(var i=0;i<n;i++){
      var j=(i+1)%n;
      var blueI=(i===10||i===21||i===32||i===43);
      var blueJ=(j===10||j===21||j===32||j===43);
      // Cleft pair (53,0) and tip pair (26,27): allowed to touch
      var isTouch=(i===26&&j===27); // only bottom tip touches; cleft pair has gap
      var minD;
      if(blueI&&blueJ)      minD=2*rBl+1;
      else if(blueI||blueJ) minD=isTouch?rBl+rSm:rBl+rSm+2;
      else                  minD=isTouch?2*rSm:2*rSm+2;
      var dx=ring[j].x-ring[i].x, dy=ring[j].y-ring[i].y;
      var d=Math.sqrt(dx*dx+dy*dy);
      if(d<minD&&d>0.001){
        var f=(minD-d)*0.7/d;
        ring[i].x-=dx*f; ring[i].y-=dy*f;
        ring[j].x+=dx*f; ring[j].y+=dy*f;
      }
    }
  }

  // Enforce exact symmetry and positions
  // Cleft pair: ring[0] (right) & ring[53] (left) each TOUCH their inward neighbour
  // ring[0] touches ring[1], ring[53] touches ring[52]
  // They do NOT touch each other — they have a gap between them (ef1 chain bead sits there)
  var cleftY=heartTop;
  if(ring[0].x<cx){var t0=ring[0];ring[0]=ring[53];ring[53]=t0;}
  // Place ring[0] touching ring[1]: distance = 2*rSm, along the line ring[1]→cleft-right
  (function(){
    var dx=ring[0].x-ring[1].x, dy=ring[0].y-ring[1].y;
    var d=Math.sqrt(dx*dx+dy*dy);
    if(d>0.001){ var s=2*rSm/d; ring[0].x=ring[1].x+dx*s; ring[0].y=ring[1].y+dy*s; }
    else { ring[0].x=ring[1].x+rSm; ring[0].y=ring[1].y; }
    ring[0].y=Math.min(ring[0].y, cleftY+rSm);
  })();
  // Mirror for ring[53]
  ring[53].x=2*cx-ring[0].x; ring[53].y=ring[0].y;

  // Bottom tip pair: ring[26] (right) & ring[27] (left) — touching, same height
  var yBot=(ring[26].y+ring[27].y)/2;
  ring[26].y=yBot; ring[27].y=yBot;
  ring[26].x=cx+touch/2; ring[27].x=cx-touch/2;

  // Blue separator pairs — same height
  var y10=(ring[10].y+ring[43].y)/2;
  ring[10].y=y10; ring[43].y=y10;
  if(ring[10].x<cx){var t10=ring[10];ring[10]=ring[43];ring[43]=t10;}
  ring[43].x=2*cx-ring[10].x;
  var y21=(ring[21].y+ring[32].y)/2;
  ring[21].y=y21; ring[32].y=y21;
  if(ring[21].x<cx){var t21=ring[21];ring[21]=ring[32];ring[32]=t21;}
  ring[32].x=2*cx-ring[21].x;

  // ── Final non-overlap pass: ALL pairs must have minimum gap ──
  // This catches any remaining overlaps (blue-blue, blue-red, red-red)
  for(var npass=0;npass<8;npass++){
    for(var i=0;i<n;i++){
      var j=(i+1)%n;
      var blueI=(i===10||i===21||i===32||i===43);
      var blueJ=(j===10||j===21||j===32||j===43);
      // Cleft pair (i=53,j=0) and tip pair (i=26,j=27): allow touching
      var isTouch=(i===26&&j===27); // only bottom tip touches; cleft pair has gap
      var minD;
      if(blueI&&blueJ)      minD=2*rBl+1;
      else if(blueI||blueJ) minD=isTouch?rBl+rSm:rBl+rSm+2;
      else                  minD=isTouch?2*rSm:2*rSm+2;
      var dx=ring[j].x-ring[i].x, dy=ring[j].y-ring[i].y;
      var d=Math.sqrt(dx*dx+dy*dy);
      if(d<minD&&d>0.001){
        var f=(minD-d)*0.5/d;
        ring[i].x-=dx*f; ring[i].y-=dy*f;
        ring[j].x+=dx*f; ring[j].y+=dy*f;
      }
    }
  }
  // Non-adjacent overlap fix (blue vs red only, 3 passes)
  for(var npass=0;npass<3;npass++){
    for(var i=0;i<n;i++){
      var blueI=(i===10||i===21||i===32||i===43);
      if(!blueI) continue; // only check blue beads vs all red
      for(var j=0;j<n;j++){
        if(j===i) continue;
        var blueJ=(j===10||j===21||j===32||j===43);
        if(blueJ) continue; // blue-blue handled by adjacent pass
        var minD=rBl+rSm+2;
        var dx=ring[j].x-ring[i].x, dy=ring[j].y-ring[i].y;
        var d=Math.sqrt(dx*dx+dy*dy);
        if(d<minD&&d>0.001){
          var f=(minD-d)*0.5/d;
          // push only the red bead (keep blue fixed)
          ring[j].x+=dx*f; ring[j].y+=dy*f;
        }
      }
    }
  }

  // Chain
  var crossY=H*0.46, minCC=2*rBl+3;
  if(crossY<cleftY+5*minCC)crossY=cleftY+5*minCC;
  var sp=(crossY-cleftY)/5.0;
  var chain=[
    {x:cx,y:crossY},
    {x:cx,y:crossY-sp*1.0},
    {x:cx,y:crossY-sp*2.2},
    {x:cx,y:crossY-sp*3.1},
    {x:cx,y:crossY-sp*4.0},
    {x:cx,y:cleftY},
  ];
  return{chain:chain,ring:ring,rSm:rSm,rBl:rBl,rCr:rCr};
}

function stopTTS(){
  speaking = false;
  if(audioObj){ audioObj.pause(); audioObj = null; }
  try{speechSynthesis.cancel()}catch(e){}
}

function splitC(t){var p=t.match(/[^.!?;]+[.!?;]+/g)||[t],r=[];for(var i=0;i<p.length;i++){var s=p[i].trim();if(s.length>80){var q=s.match(/[^,]+,?/g)||[s];for(var j=0;j<q.length;j++){if(q[j].trim())r.push(q[j].trim())}}else if(s)r.push(s)}return r}

function spkC(ch,lg,i,d){
  if(!speaking||i>=ch.length){speaking=false;if(d)d();return}
  var u=new SpeechSynthesisUtterance(ch[i]);
  u.lang=lg; u.rate=0.72; u.pitch=0.95;
  u.onend=function(){if(!speaking){if(d)d();return}setTimeout(function(){spkC(ch,lg,i+1,d)},350)};
  u.onerror=function(){spkC(ch,lg,i+1,d)};
  try{speechSynthesis.speak(u)}catch(e){spkC(ch,lg,i+1,d)}
}

async function speak(txt, lg, d){
  stopTTS();
  if(!S.tts || !txt) { if(d)d(); return; }
  
  // Use ElevenLabs for Polish only if text is short enough (API limit)
  if(lg.startsWith('pl') && apiKey && txt.length <= 400){
    speaking = true;
    try {
      const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'xi-api-key': apiKey
        },
        body: JSON.stringify({
          text: txt,
          model_id: 'eleven_multilingual_v2',
          voice_settings: { stability: 0.5, similarity_boost: 0.75 }
        })
      });
      if(!response.ok) throw new Error('ElevenLabs failed');
      const blob = await response.blob();
      const url = URL.createObjectURL(blob);
      if(!speaking) return;
      audioObj = new Audio(url);
      audioObj.onended = function(){ speaking = false; if(d)d(); };
      audioObj.onerror = function(){ 
        console.warn('Audio play failed, falling back to system TTS');
        speaking = false; fallbackSpeak(txt, lg, d); 
      };
      audioObj.play();
    } catch(e) {
      console.warn('ElevenLabs API failed, falling back to system TTS:', e);
      speaking = false;
      fallbackSpeak(txt, lg, d);
    }
  } else {
    fallbackSpeak(txt, lg, d);
  }
}

function fallbackSpeak(txt, lg, d){
  var ch = splitC(txt);
  setTimeout(function(){
    if(!S.tts){if(d)d();return}
    speaking = true;
    spkC(ch, lg, 0, d);
  }, 200);
}

  svg+='<line x1="'+c[3].x.toFixed(1)+'" y1="'+c[3].y.toFixed(1)+'" x2="'+c[4].x.toFixed(1)+'" y2="'+c[4].y.toFixed(1)+'" stroke="#cc2222" stroke-width="1.8" stroke-opacity=".5"/>';
  svg+='<line x1="'+c[4].x.toFixed(1)+'" y1="'+c[4].y.toFixed(1)+'" x2="'+c[5].x.toFixed(1)+'" y2="'+c[5].y.toFixed(1)+'" stroke="#888" stroke-width="1" stroke-dasharray="2,8" stroke-opacity=".2"/>';
  svg+='<line x1="'+c[5].x.toFixed(1)+'" y1="'+c[5].y.toFixed(1)+'" x2="'+ring[0].x.toFixed(1)+'" y2="'+ring[0].y.toFixed(1)+'" stroke="#cc2222" stroke-width="1.6" stroke-opacity=".4"/>';
  svg+='<line x1="'+c[5].x.toFixed(1)+'" y1="'+c[5].y.toFixed(1)+'" x2="'+ring[53].x.toFixed(1)+'" y2="'+ring[53].y.toFixed(1)+'" stroke="#cc2222" stroke-width="1.6" stroke-opacity=".4"/>';
  for(var i=0;i<53;i++){
    var p1=ring[i],p2=ring[i+1];
    var blk=(i===9||i===10||i===20||i===21||i===31||i===32||i===42||i===43);
    svg+='<line x1="'+p1.x.toFixed(1)+'" y1="'+p1.y.toFixed(1)+'" x2="'+p2.x.toFixed(1)+'" y2="'+p2.y.toFixed(1)+'" stroke="'+(blk?'#4466cc':'#cc2222')+'" stroke-width="1.6" stroke-opacity=".4"/>';
  }
  svg+='</g>';

  for(var i=0;i<SEQ.length;i++){
    var s=SEQ[i];
    if(s.t==='novis') continue;
    var state=i<S.cur?'done':(i===S.cur?'active':'future');
    var col=s.clr, pos=getPos(i);
    if(!pos) continue;
    var px=pos.x.toFixed(1),py=pos.y.toFixed(1);
    if(s.t==='cross'){
      var cc=state==='active'?'#f5d675':(state==='done'?'#d4a843':'#b8860b');
      svg+='<g filter="'+(state==='active'?'url(#glow)':'url(#soft)')+'" style="cursor:pointer" onclick="goTo('+i+')">'
        +'<line x1="'+px+'" y1="'+(pos.y-szCr).toFixed(1)+'" x2="'+px+'" y2="'+(pos.y+szCr).toFixed(1)+'" stroke="'+cc+'" stroke-width="4.5" stroke-linecap="round"/>'
        +'<line x1="'+(pos.x-szCr*.65).toFixed(1)+'" y1="'+(pos.y-szCr*.33).toFixed(1)+'" x2="'+(pos.x+szCr*.65).toFixed(1)+'" y2="'+(pos.y-szCr*.33).toFixed(1)+'" stroke="'+cc+'" stroke-width="4.5" stroke-linecap="round"/>'
        +'</g>';
      continue;
    }
    var r=col==='blue'?rBl:(s.t==='cRed'?rCr:rSm);
    var fill,stroke;
    if(state==='future'){fill=col==='blue'?'#1a4aee':'#dd1111';stroke=col==='blue'?'#5599ff':'#ff4444';}
    else{fill='#ffffff';stroke=col==='blue'?'#3366ff':'#dd0000';}
    var flt=state==='active'?'url(#glow)':'url(#soft)';
    var shine=state==='future'?('<circle cx="'+(pos.x-r*.3).toFixed(1)+'" cy="'+(pos.y-r*.3).toFixed(1)+'" r="'+(r*.24).toFixed(1)+'" fill="rgba(255,255,255,.22)"/>'):'';
    svg+='<g filter="'+flt+'" style="cursor:pointer" onclick="goTo('+i+')">'
      +'<circle cx="'+px+'" cy="'+py+'" r="'+r.toFixed(1)+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="2.5"/>'
      +shine+'</g>';
  }
  svg+='</svg>';

  // "Jezu, ufam Tobie" below the chaplet
  var trustTop=H*0.75;
  var trustHTML='<div style="position:absolute;left:0;right:0;top:'+trustTop+'px;z-index:12;text-align:center;pointer-events:none;font:italic 16px/1 Georgia,serif;color:rgba(212,168,67,.95);letter-spacing:1px;text-shadow:0 1px 10px rgba(0,0,0,1)">'+t.su+'</div>';

  var pray='';
  if(S.text&&step){
    pray='<div class="pr"><div class="pb">'
      +'<div class="pt">'+t[step.l]+'</div>'
      +'<div class="pp">'+t[step.p]+'</div>'
      +(prog?'<div class="pc">'+prog+'</div>':'')
      +'</div></div>';
  }
  var bb='<div class="bar bar-b">'
    +'<button class="nb" onclick="goPrev()"'+(S.cur<=0?' disabled style="opacity:.3"':'')+'>‹</button>'
    +'<button class="nb-big" onclick="goNext()"'+(S.cur>=SEQ.length-1?' disabled style="opacity:.3"':'')+'>+</button>'
    +'<button class="nb" onclick="togAuto()" style="font-size:16px">'+(S.auto?'⏸':'▶')+'</button>'
    +'</div>';
  app.innerHTML=tb+lp
    +'<div class="main"><img class="bgimg" src="'+BG+'" alt="" style="opacity:.65">'
    +rayHTML+svg+trustHTML+'</div>'+pray+bb;
}

function go(){S.cur=0;render()}
function goNext(){if(S.cur<SEQ.length-1){stopTTS();clrA();S.cur++;render()}else{S.auto=false;render()}}
function goPrev(){if(S.cur>0){stopTTS();clrA();S.cur--;render()}}
function goTo(i){stopTTS();clrA();S.cur=i;render()}
function rst(){stopTTS();clrA();S.cur=-1;S.auto=false;render()}
function tg(k){S[k]=!S[k];if(k==='tts'&&!S.tts)stopTTS();render()}
function tgTts(){S.tts=!S.tts;if(!S.tts)stopTTS();render()}
function tgL(){S.lo=!S.lo;render()}
function cL(c){S.lang=c;S.lo=false;stopTTS();render()}
function togAuto(){S.auto=!S.auto;if(S.auto){render();stA()}else{clrA();stopTTS();render()}}
window.addEventListener('resize',function(){if(S.cur>=0)render()});
document.addEventListener('keydown',function(e){if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();goNext()}if(e.key==='ArrowLeft'){e.preventDefault();goPrev()}});
var tx=0;
document.addEventListener('touchstart',function(e){tx=e.touches[0].clientX},{passive:true});
document.addEventListener('touchend',function(e){var d=e.changedTouches[0].clientX-tx;if(Math.abs(d)>60){d<0?goNext():goPrev()}},{passive:true});
var deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  var b=document.createElement('div');
  b.className='pwa-b'; b.innerHTML='Zainstaluj aplikację';
  b.onclick=function(){
    b.style.display='none';
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then((c)=>{deferredPrompt=null});
  };
  document.getElementById('app').appendChild(b);
  setTimeout(()=>{b.style.display='block'},2000);
});
render();
</script></body></html>
